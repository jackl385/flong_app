function calcWinner(cups,tA,tB) {

}

function suggest(games) {

// Returns top N suggested matchups, excluding any pids in the excludePids array
function suggestN(games, n, excludePids=[]) {
  const eligible = PIDS.filter(p=>!excludePids.includes(p));
  const paired={},faced={},playCount={},recentCount={};
  PIDS.forEach(p=>{paired[p]={};faced[p]={};playCount[p]=0;recentCount[p]=0;});
  const last3=games.slice(-3);
  games.forEach(g=>{
    [...g.teamA,...g.teamB].forEach(p=>playCount[p]++);
    [[...g.teamA],[...g.teamB]].forEach(t=>{if(t.length===2){paired[t[0]][t[1]]=(paired[t[0]][t[1]]||0)+1;paired[t[1]][t[0]]=(paired[t[1]][t[0]]||0)+1;}});
    g.teamA.forEach(a=>g.teamB.forEach(b=>{faced[a][b]=(faced[a][b]||0)+1;faced[b][a]=(faced[b][a]||0)+1;}));
  });
  last3.forEach(g=>[...g.teamA,...g.teamB].forEach(p=>recentCount[p]++));
  const scored=[];
  for(let i=0;i<eligible.length;i++) for(let j=i+1;j<eligible.length;j++) for(let k=0;k<eligible.length;k++) for(let l=k+1;l<eligible.length;l++){
    const a1=eligible[i],a2=eligible[j],b1=eligible[k],b2=eligible[l];
    if(new Set([a1,a2,b1,b2]).size!==4) continue;
    let s=(paired[a1][a2]||0)*30+(paired[b1][b2]||0)*30;
    [a1,a2].forEach(a=>[b1,b2].forEach(b=>s+=(faced[a][b]||0)*10));
    [a1,a2,b1,b2].forEach(p=>s+=recentCount[p]*8+playCount[p]*2);
    const sit=PIDS.filter(p=>![a1,a2,b1,b2].includes(p));
    const maxP=Math.max(...Object.values(playCount),0);
    sit.forEach(p=>s-=(maxP-playCount[p])*3);
    scored.push({teamA:[a1,a2],teamB:[b1,b2],sitting:sit,score:s});
  }
  scored.sort((a,b)=>a.score-b.score);
  return scored.slice(0,n);
}

function probToAmerican(p) {
  if(p<=0||p>=1) return "EVEN";
  if(Math.abs(p-0.5)<0.001) return "+100";
  const odds = p > 0.5 ? Math.round(-p/(1-p)*100) : Math.round((1-p)/p*100);
  return p > 0.5 ? `${odds}` : `+${odds}`;
}

const VIG = 1.015;

function buildMarkets(matchup, allStats, players) {
  const {teamA, teamB} = matchup;
  const nameA = teamA.map(p=>players[p]).join(" & ");
  const nameB = teamB.map(p=>players[p]).join(" & ");
  const cprA = teamA.reduce((s,p)=>s+(allStats[p]?.cpr??50),0);
  const cprB = teamB.reduce((s,p)=>s+(allStats[p]?.cpr??50),0);
  const trueA = Math.exp(cprA/25)/(Math.exp(cprA/25)+Math.exp(cprB/25));
  const trueB = 1-trueA;
  const vigA = trueA*VIG, vigB = trueB*VIG;
  const playerProps = [...teamA,...teamB].map(pid=>{
    const st=allStats[pid];
    const cupPct=st?.cupPct!=null?st.cupPct/100:0.5;
    const trueOver=Math.min(0.93,Math.max(0.07,Math.pow(cupPct,0.6)));
    return {pid,name:players[pid],overProb:trueOver*VIG,underProb:(1-trueOver)*VIG};
  });
  const closeness=1-Math.abs(trueA-trueB);
  const trueClose=Math.min(0.45,0.12+closeness*0.20);
  const nakedRate=Math.min(0.40,0.10+Math.abs(trueA-trueB)*0.15);
  return {
    nameA,nameB,trueA,trueB,vigA,vigB,
    mlA:probToAmerican(vigA),mlB:probToAmerican(vigB),
    playerProps,
    closeGame:{yes:trueClose*VIG,no:(1-trueClose)*VIG},
    nakedLap:{yes:nakedRate*VIG,no:(1-nakedRate)*VIG},
  };
}

function calcCPR(pid, games, allStats) {
  const mg = games.filter(g => g.teamA.includes(pid) || g.teamB.includes(pid));
  if (!mg.length) return null;
  const w = mg.filter(g => (g.teamA.includes(pid)&&g.winner==="A")||(g.teamB.includes(pid)&&g.winner==="B")).length;
  const cups = mg.reduce((s,g)=>s+g.cups[pid],0);
  const naked = games.filter(g=>g.nakedLap&&g.nakedLap[pid]).length;
  const puskas = games.filter(g=>g.puskas&&g.puskas[pid]).length;
  const gp = mg.length;

  // 1. Win rate (0–30)
  const winComp = (w / gp) * 30;

  // 2. Cup efficiency (0–20): cups hit vs max possible
  const cupComp = (cups / (gp * 5)) * 20;

  // 3. Cup differential (0–15): player avg cups/game minus opponents' avg cups/game,
  //    normalized so the best differential in the field maps to 15 pts.
  const oppCups = mg.reduce((s,g)=>{
    const opp = g.teamA.includes(pid)?g.teamB:g.teamA;
    return s + opp.reduce((ss,op)=>ss+(g.cups[op]||0),0);
  },0);
  const oppCount = mg.reduce((s,g)=>s+(g.teamA.includes(pid)?g.teamB:g.teamA).length,0);
  const rawDiff = (cups/gp) - (oppCups/Math.max(oppCount,1));
  // Field max diff for normalization (find best diff across all players)
  let fieldMaxDiff = 0.01;
  Object.keys(allStats).forEach(p2=>{
    const s2=allStats[p2]; if(s2&&s2.cupDiff!=null) fieldMaxDiff=Math.max(fieldMaxDiff,Math.abs(s2.cupDiff));
  });
  const diffComp = Math.max(0, (rawDiff / fieldMaxDiff)) * 15;

  // 4. Recent form — last 3 of their games (0–12)
  const last3 = mg.slice(-3);
  const recentW = last3.filter(g => (g.teamA.includes(pid)&&g.winner==="A")||(g.teamB.includes(pid)&&g.winner==="B")).length;
  const formComp = (recentW / last3.length) * 12;

  // 5. Clutch factor (0–10): win rate in close games where losing team hit ≥8 total cups
  const closeGames = mg.filter(g => {
    const lTeam = g.winner==="A" ? g.teamB : g.teamA;
    return lTeam.reduce((s,p)=>s+(g.cups[p]||0),0) >= 8;
  });
  const closeWins = closeGames.filter(g=>(g.teamA.includes(pid)&&g.winner==="A")||(g.teamB.includes(pid)&&g.winner==="B")).length;
  // If no close games yet, give league-average (5 pts); otherwise score on win rate
  const clutchComp = closeGames.length > 0 ? (closeWins / closeGames.length) * 10 : 5;

  // 6. Puskas rate bonus (0–5)
  const puskasComp = Math.min((puskas / gp), 1) * 5;

  // 7. Opponent strength (0–5): reward beating high win-rate opponents
  let oppWinSum = 0, oppGameCount = 0;
  mg.forEach(g => {
    const opps = g.teamA.includes(pid) ? g.teamB : g.teamA;
    opps.forEach(op => {
      const os = allStats[op];
      if (os && os.gp > 0) { oppWinSum += (os.winPct??50)/100; oppGameCount++; }
    });
  });
  const oppComp = oppGameCount > 0 ? (oppWinSum/oppGameCount) * 5 : 2.5;

  // 8. Sample size bonus (0–3)
  const sampleComp = Math.min(gp / 5, 1) * 3;

  // 9. Naked lap penalty: −4 per naked, capped at −12
  const nakedPenalty = Math.max(-12, -naked * 4);

  const raw = winComp + cupComp + diffComp + formComp + clutchComp + puskasComp + oppComp + sampleComp + nakedPenalty;
  return Math.max(0, Math.min(100, Math.round(raw)));
}

function getCPRColor(cpr) {

}

// Championship probability via Monte Carlo simulation.
// Simulates N possible continuations of the season. In each simulation:
//   1. Start from current win/cup/gp tallies.
//   2. Play random future matchups (all C(6,2)*C(4,2)/2 = 45 valid 2v2 combos
//      chosen uniformly) until TARGET_GAMES total games played.
//   3. Each simulated game is won probabilistically: team win prob proportional
//      to sum of CPR scores. Cup counts drawn from empirical distributions.
//   4. Rank players by win% (tiebreak: cup avg). Top 4 = championship.
// Result: for each player, fraction of simulations in which they finish top 4.
// Values are true probabilities in [0,100] and do NOT need to sum to 400%.
function calcChampProbs(currentGames, allStats) {
  const N = 3000;
  const TARGET_GAMES = Math.max(currentGames.length + 8, 18);
  const topCounts = {};
  PIDS.forEach(p => topCounts[p] = 0);

  // Precompute all valid 2v2 matchups (15 total for 6 players)
  const allMatchups = [];
  for(let i=0;i<6;i++) for(let j=i+1;j<6;j++) for(let k=0;k<6;k++) for(let l=k+1;l<6;l++){
    const s=new Set([PIDS[i],PIDS[j],PIDS[k],PIDS[l]]);
    if(s.size===4) allMatchups.push({teamA:[PIDS[i],PIDS[j]],teamB:[PIDS[k],PIDS[l]]});
  }

  for(let sim=0; sim<N; sim++){
    // Start from current state
    const wins={}, gp={}, cupTot={};
    PIDS.forEach(p=>{wins[p]=0; gp[p]=0; cupTot[p]=0;});
    currentGames.forEach(g=>{
      [...g.teamA,...g.teamB].forEach(p=>{gp[p]++; cupTot[p]+=(g.cups[p]||0);});
      (g.winner==="A"?g.teamA:g.teamB).forEach(p=>wins[p]++);
    });

    let total = currentGames.length;
    while(total < TARGET_GAMES){
      // Pick a random valid matchup
      const m = allMatchups[Math.floor(Math.random()*allMatchups.length)];
      // Win probability: softmax on sum of team CPRs (temp=30 to avoid extremes)
      const cprA = m.teamA.reduce((s,p)=>s+(allStats[p]?.cpr??50),0);
      const cprB = m.teamB.reduce((s,p)=>s+(allStats[p]?.cpr??50),0);
      const pA = Math.exp(cprA/30)/(Math.exp(cprA/30)+Math.exp(cprB/30));
      const aWins = Math.random() < pA;
      const wTeam = aWins?m.teamA:m.teamB;
      const lTeam = aWins?m.teamB:m.teamA;
      // Cup counts: winners draw from [3,4,5], losers from [1,2,3,4]
      wTeam.forEach(p=>{const c=3+Math.floor(Math.random()*3); cupTot[p]+=c; gp[p]++; wins[p]++;});
      lTeam.forEach(p=>{const c=1+Math.floor(Math.random()*4); cupTot[p]+=c; gp[p]++;});
      total++;
    }

    // Rank: win% desc, tiebreak cup avg desc
    const ranked=PIDS.slice().sort((a,b)=>{
      const wrA=gp[a]>0?wins[a]/gp[a]:0, wrB=gp[b]>0?wins[b]/gp[b]:0;
      if(Math.abs(wrA-wrB)>0.0001) return wrB-wrA;
      return (gp[b]>0?cupTot[b]/gp[b]:0)-(gp[a]>0?cupTot[a]/gp[a]:0);
    });
    ranked.slice(0,4).forEach(p=>topCounts[p]++);
  }

  const probs={};
  PIDS.forEach(p=>probs[p]=Math.round(topCounts[p]/N*100));
  return probs;
}

  const pstat=pid=>{
    const mg=games.filter(g=>g.teamA.includes(pid)||g.teamB.includes(pid));
    const w=mg.filter(g=>(g.teamA.includes(pid)&&g.winner==="A")||(g.teamB.includes(pid)&&g.winner==="B")).length;
    const l=mg.length-w,cups=mg.reduce((s,g)=>s+g.cups[pid],0),mx=mg.length*5;
    const last5=mg.slice(-5).map(g=>((g.teamA.includes(pid)&&g.winner==="A")||(g.teamB.includes(pid)&&g.winner==="B"))?"W":"L").reverse();
    const last3=mg.slice(-3);
    const recentW=last3.filter(g=>(g.teamA.includes(pid)&&g.winner==="A")||(g.teamB.includes(pid)&&g.winner==="B")).length;
    const recentCups=last3.reduce((s,g)=>s+g.cups[pid],0);
    const recentCupRate=last3.length>0?recentCups/(last3.length*5):0;
    const overallWinRate=mg.length>0?w/mg.length:0;
    const overallCupRate=mx>0?cups/mx:0;
    // Cup differential: player's avg cups/game minus opponents' avg cups/game
    const oppCups=mg.reduce((s,g)=>{
      const opp=g.teamA.includes(pid)?g.teamB:g.teamA;
      return s+opp.reduce((ss,op)=>ss+(g.cups[op]||0),0);
    },0);
    const oppGames=mg.reduce((s,g)=>s+(g.teamA.includes(pid)?g.teamB:g.teamA).length,0);
    const cupDiff=mg.length>0?Math.round(((cups/mg.length)-(oppCups/Math.max(oppGames,1)))*10)/10:null;
    // On fire: at least 2 wins in last 3, AND recent win rate beats overall by 15%+ OR recent cup rate beats overall by 15%+
    const onFire=mg.length>=3&&recentW>=2&&(
      (recentW/last3.length)>=(overallWinRate+0.15)||
      recentCupRate>=(overallCupRate+0.15)
    );
    return {w,l,cups,cupPct:mx>0?Math.round(cups/mx*100):null,naked:games.filter(g=>g.nakedLap&&g.nakedLap[pid]).length,puskas:games.filter(g=>g.puskas&&g.puskas[pid]).length,winPct:mg.length?Math.round(w/mg.length*100):null,gp:mg.length,cupAvg:mg.length?cups/mg.length:0,cupDiff,last5,onFire};
  };

  const lb=useMemo(()=>{
    const rawStats = {};
    PIDS.forEach(pid => { rawStats[pid] = pstat(pid); });
    PIDS.forEach(pid => { rawStats[pid].cpr = calcCPR(pid, games, rawStats); });
    const champProbs = calcChampProbs(games, rawStats);
    const players_arr = PIDS.map(pid=>({pid,name:players[pid],...rawStats[pid],cpr:rawStats[pid].cpr,champProb:champProbs[pid]}));
    // Games behind: leader is player with most wins (tiebreak: fewest losses)
    const leader = players_arr.reduce((best,p)=>(!best||p.w>best.w||(p.w===best.w&&p.l<best.l))?p:best, null);
    players_arr.forEach(p=>{
      p.gb = leader&&p.gp>0 ? ((leader.w-p.w)+(p.l-leader.l))/2 : null;
    });
    return players_arr.sort((a,b)=>{
    if(sort==="winpct") return (b.winPct??-1)-(a.winPct??-1);
    if(sort==="cups")   return b.cups-a.cups;
    if(sort==="cupPct") return (b.cupPct??-1)-(a.cupPct??-1);
    if(sort==="puskas") return b.puskas-a.puskas;
    if(sort==="naked")  return a.naked-b.naked;
    if(sort==="cpr")    return (b.cpr??-1)-(a.cpr??-1);
    if(sort==="champ")  return (b.champProb??-1)-(a.champProb??-1);
    if(sort==="gb")     return (a.gb??-999)-(b.gb??-999);
    if(sort==="gp")     return b.gp-a.gp;
    if(sort==="cdiff")  return (b.cupDiff??-999)-(a.cupDiff??-999);
    return 0;
  });},[games,players,sort]);

  const top4=useMemo(()=>[...lb].sort((a,b)=>(b.winPct??-1)-(a.winPct??-1)||(b.cupAvg??0)-(a.cupAvg??0)).slice(0,4),[lb]);

  const cycle=pid=>setForm(f=>{
    const inA=f.teamA.includes(pid),inB=f.teamB.includes(pid);

    if(inB)return{...f,teamB:f.teamB.filter(p=>p!==pid),sitting:[...f.sitting,pid]};
    if(f.teamA.length<2)return{...f,sitting:f.sitting.filter(p=>p!==pid),teamA:[...f.teamA,pid]};
    if(f.teamB.length<2)return{...f,sitting:f.sitting.filter(p=>p!==pid),teamB:[...f.teamB,pid]};
    return f;
  });

  const addGame=()=>{
    const cups={}; PIDS.forEach(p=>cups[p]=+form.cups[p]||0);
    const w=calcWinner(cups,form.teamA,form.teamB);
    const losers=w==="A"?form.teamB:form.teamA;
    const nl={}; PIDS.forEach(p=>nl[p]=losers.includes(p)&&cups[p]===0);
    const ng={id:Date.now(),teamA:[...form.teamA],teamB:[...form.teamB],cups,puskas:{...form.puskas},nakedLap:nl,winner:w};
    const updatedGames=[...games,ng];
    setGames(updatedGames); setForm(DEF_FORM()); setTab("lb"); msg("✓ Game saved");
    // Auto-export JSON
    const b=new Blob([JSON.stringify({players,games:updatedGames,recaps},null,2)],{type:"application/json"});
    const u=URL.createObjectURL(b),a=document.createElement("a");
    a.href=u; a.download=`flong-g${updatedGames.length}-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(u);
  };

  const exp=()=>{
    const b=new Blob([JSON.stringify({players,games,recaps},null,2)],{type:"application/json"});
    const u=URL.createObjectURL(b),a=document.createElement("a");

  };
  const imp=e=>{

  };

    setGames(SEED.games);setPlayers(SEED.players);setRecaps({});setConfirmClear(false);msg("✓ Reset");
  };

  const sumA=form.teamA.reduce((s,p)=>s+(+form.cups[p]||0),0);
  const sumB=form.teamB.reduce((s,p)=>s+(+form.cups[p]||0),0);

  const S=({k,l})=><button className="sbtn" onClick={()=>setSort(k)} style={{border:`1px solid ${sort===k?"#00f5ff55":"#222"}`,background:sort===k?"#00f5ff11":"#111",color:sort===k?"#00f5ff":"#555"}}>{l}</button>;
  const tl=pid=>form.teamA.includes(pid)?{l:"A",c:CA}:form.teamB.includes(pid)?{l:"B",c:CB}:{l:"–",c:"#444"};

  return (
    <div style={{minHeight:"100vh",padding:"20px 16px 60px",backgroundImage:`radial-gradient(ellipse at 20% 20%,${CA}08 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,${CB}08 0%,transparent 60%)`}}>

      {/* HEADER */}

        <div style={{fontSize:44,fontWeight:900,background:`linear-gradient(90deg,${CA},#fff,${CB})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>FLONG</div>
        <div style={{fontSize:10,letterSpacing:4,color:"#444",textTransform:"uppercase"}}>SCOREBOARD</div>
        <div style={{marginTop:5,fontSize:9,color:"#252525",letterSpacing:2}}>● AUTO-SAVING · {games.length} GAMES LOGGED</div>
      </div>

      {suggestion&&(

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{fontSize:17,fontWeight:700,marginBottom:6}}>
                <span style={{color:CA}}>{suggestion.teamA.map(p=>players[p]).join(" + ")}</span>
                <span style={{color:"#444",margin:"0 12px",fontSize:14}}>vs</span>

              CPR
              <span onClick={e=>{e.stopPropagation();setCprInfo(v=>!v);}} style={{cursor:"pointer",color:"#555",fontSize:11,border:"1px solid #333",borderRadius:"50%",width:15,height:15,display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>?</span>
            </div>
            <div style={{fontSize:11,color:sort==="champ"?CA:"#555",textAlign:"right",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}} onClick={()=>setSort("champ")}>
              🏆%
              <span onClick={e=>{e.stopPropagation();setChampInfo(v=>!v);}} style={{cursor:"pointer",color:"#555",fontSize:11,border:"1px solid #333",borderRadius:"50%",width:15,height:15,display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>?</span>
            </div>
          </div>
          {lb.map((p,i)=>{const medals=["🥇","🥈","🥉"];const r=rate(p.w,p.l);return(
            <div key={p.pid} className="lbg lbr" style={{opacity:p.gp>0?1:0.3}}>
              <div style={{fontSize:16}}>{medals[i]||<span style={{color:"#333",fontSize:13}}>{i+1}</span>}</div>
              <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                <span style={{color:"#e8e8e8",fontWeight:700,fontSize:15,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</span>
                {p.onFire&&<span style={{fontSize:14}} title="On fire — outperforming recent form vs overall average">🔥</span>}

                  {p.last5.length ? p.last5.map((res,i)=>(
                    <span key={i} style={{fontSize:11,fontWeight:800,color:res==="W"?"#4caf50":"#ff4444",background:res==="W"?"#4caf5022":"#ff444422",border:`1px solid ${res==="W"?"#4caf5044":"#ff444444"}`,borderRadius:4,padding:"1px 5px",lineHeight:1.4}}>{res}</span>

              <div style={{textAlign:"center",fontSize:14,fontWeight:700,color:"#777"}}>{p.gp>0?p.gp:<span style={{color:"#2a2a2a"}}>—</span>}</div>

              <div style={{textAlign:"center"}}>{p.winPct!==null?<span style={{fontSize:15,fontWeight:800,color:p.winPct>=60?GOLD:p.winPct>=40?"#ccc":CB}}>{p.winPct}%</span>:<span style={{color:"#2a2a2a"}}>—</span>}</div>

              <div style={{textAlign:"center"}}>
                {p.cupDiff!==null
                  ?<span style={{fontSize:14,fontWeight:800,color:p.cupDiff>0?"#4caf50":p.cupDiff<0?CB:"#666"}}>{p.cupDiff>0?"+":""}{p.cupDiff}</span>
                  :<span style={{color:"#2a2a2a"}}>—</span>}
              </div>
              <div style={{textAlign:"center",fontSize:14,fontWeight:700,color:p.puskas>0?GOLD:"#2a2a2a"}}>{p.puskas>0?`⚽ ${p.puskas}`:"—"}</div>
              <div style={{textAlign:"right",fontSize:14,fontWeight:700,color:p.naked>0?NAK:"#2a2a2a"}}>{p.naked>0?`🩲 ${p.naked}`:"—"}</div>
              <div style={{textAlign:"right"}}>
                {p.cpr!==null
                  ?<span style={{fontSize:15,fontWeight:800,color:getCPRColor(p.cpr)}} title="Claude Player Rating">{p.cpr}</span>
                  :<span style={{color:"#2a2a2a"}}>—</span>}
              </div>
              <div style={{textAlign:"right"}}>
                {p.champProb!=null
                  ?<span style={{fontSize:15,fontWeight:800,color:p.champProb>=75?GOLD:p.champProb>=55?"#ff8c00":p.champProb>=40?"#aaa":"#888"}}>{p.champProb}%</span>
                  :<span style={{color:"#2a2a2a"}}>—</span>}
              </div>
            </div>
          );})}
          {!games.length&&<div style={{textAlign:"center",padding:"28px 0",color:"#222",fontSize:12,letterSpacing:3,minWidth:960}}>LOG A GAME TO SEE STATS</div>}
          </div>
        </div>
      )}

      {/* ── LOG GAME ── */}
      {tab==="log"&&(
        <div style={{border:"1px solid #1a1a2e",borderRadius:12,padding:20,background:"#0d0d18"}}>
          <div style={{fontSize:11,letterSpacing:3,color:"#555",marginBottom:4,textTransform:"uppercase"}}>Log Game</div>
          <div style={{fontSize:10,color:"#333",marginBottom:18,letterSpacing:1}}>CLICK A / B / – TO ASSIGN · WINNER AUTO-DETECTED AT 10 CUPS</div>
          <div style={{marginBottom:16,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {!editing
              ?<button className="ibtn" onClick={()=>{setEditN({...players});setEditing(true);}}>✏️ EDIT NAMES</button>
              :<>{PIDS.map(pid=><input key={pid} value={editN[pid]} onChange={e=>setEditN(n=>({...n,[pid]:e.target.value}))} style={{background:"#111",border:"1px solid #444",color:"#ccc",padding:"4px 8px",borderRadius:6,fontSize:13,width:100}}/>)}
                <button className="ibtn" style={{color:CA,borderColor:CA+"55"}} onClick={()=>{setPlayers({...editN});setEditing(false);}}>✓ SAVE</button>
                <button className="ibtn" onClick={()=>setEditing(false)}>CANCEL</button></>}
          </div>
          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            {[{s:"A",c:CA,ps:form.teamA},{s:"B",c:CB,ps:form.teamB}].map(({s,c,ps})=>(
              <div key={s} style={{padding:"9px 16px",borderRadius:8,border:`1px solid ${c}33`,background:`${c}08`,fontSize:13}}>
                <span style={{color:c,fontWeight:700}}>Team {s}: </span>
                <span style={{color:"#999"}}>{ps.length?ps.map(p=>players[p]).join(" + "):"—"}</span>
                {ps.length===2&&<span style={{color:c+"77",marginLeft:8,fontSize:12}}>{ps.reduce((t,p)=>t+(+form.cups[p]||0),0)} cups</span>}
              </div>
            ))}
            {prev10&&<div style={{padding:"9px 16px",borderRadius:8,border:`1px solid ${GOLD}55`,background:`${GOLD}12`,fontSize:13,color:GOLD,fontWeight:700}}>🏆 Team {prev10} wins!</div>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:10,marginBottom:14}}>
            {PIDS.map(pid=>{const t=tl(pid);const isSit=t.l==="–";return(
              <div key={pid} style={{padding:"13px 14px",borderRadius:10,border:`1px solid ${t.c}33`,background:`${t.c}07`,opacity:isSit?.4:1,transition:"all .15s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{color:t.c,fontWeight:700,fontSize:14}}>{players[pid]}</span>
                  <button onClick={()=>cycle(pid)} style={{padding:"3px 12px",borderRadius:6,cursor:"pointer",fontWeight:900,fontSize:14,border:`1px solid ${t.c}55`,background:`${t.c}22`,color:t.c,fontFamily:"inherit"}}>{t.l}</button>

                {!isSit&&(
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>

                      <div style={{fontSize:10,color:"#555",letterSpacing:1,marginBottom:3}}>CUPS HIT</div>

      {/* ── CHAMPIONSHIP ── */}
      {tab==="champ"&&(

            <span style={{color:GOLD}}>ⓘ</span> The <strong style={{color:"#aaa"}}>🏆%</strong> shown is each player's probability of finishing in the <strong style={{color:"#aaa"}}>top 4</strong> and making the championship match. Computed via Monte Carlo simulation of future matchups — each player's value is an independent probability in [0%, 100%].

                <span style={{color:"#333",fontSize:13}}>+</span>
                <div><div style={{color:CA}}>{top4[3].name}</div><div style={{fontSize:10,color:"#555",marginTop:2}}>SEED 4 · {top4[3].champProb}%</div></div>

                <div><div style={{color:CB}}>{top4[2].name}</div><div style={{fontSize:10,color:"#555",marginTop:2}}>SEED 3 · {top4[2].champProb}%</div></div>
              </div>

      )}

      {/* ── FLONGDUEL ── */}
      {tab==="duel"&&(()=>{
        const FD_GREEN="#1aff8c";
        const BOOK = 1.15;
        const toAm = p => {
          if(p>=1) return "-9999"; if(p<=0) return "+9999";
          if(p>0.5) return String(Math.round(-p/(1-p)*100));
          return "+" + String(Math.round((1-p)/p*100));
        };
        const vig2 = trueP => {
          const vP = Math.min(0.99, trueP*BOOK);
          const vQ = Math.min(0.99, (1-trueP)*BOOK);
          return [vP, vQ, toAm(vP), toAm(vQ)];
        };

        const st = {};
        lb.forEach(p => { st[p.pid]=p; });

        // ── BINOMIAL MODEL ──
        // Each player has a per-cup hit probability p_i.
        // Cups hit in a game ~ Binomial(5, p_i), independent across cups.
        // MLE: p_hat = totalCups / (5 * GP), shrunk toward league prior with 3 phantom games.
        // This is principled: same p governs each of the 5 cup attempts, so
        // P(hits k cups) = C(5,k) * p^k * (1-p)^(5-k).

        const leagueAllCups = games.flatMap(g=>[...g.teamA,...g.teamB].map(pid=>g.cups[pid]||0));
        const leagueTotalCups = leagueAllCups.reduce((a,b)=>a+b,0);
        const leagueTotalAttempts = leagueAllCups.length * 5; // each appearance = 5 cup attempts
        const leagueP = leagueTotalAttempts>0 ? leagueTotalCups/leagueTotalAttempts : 0.8;

        // Shrunk per-cup probability for a player: 3 phantom games at league rate
        const PHANTOM_GP = 3;
        const playerP = pid => {
          const pst = st[pid]; const gp = pst?.gp||0;
          const empiricalCups = gp>0 ? (pst.cupAvg||0) : null;
          // Shrink toward league: weight empirical by GP, phantom by PHANTOM_GP
          if(empiricalCups===null) return leagueP;
          const empiricalP = empiricalCups / 5; // convert avg cups to per-cup prob
          return (empiricalP*gp + leagueP*PHANTOM_GP) / (gp + PHANTOM_GP);
        };

        // Binomial PMF: P(X = k) for X ~ Bin(5, p)
        const binomCoeff = [1,5,10,10,5,1];
        const binomPMF = (p, k) => binomCoeff[k] * Math.pow(p,k) * Math.pow(1-p,5-k);
        // P(X > line) = sum_{k=ceil(line+0.5)}^{5} P(X=k)
        const binomOver = (p, line) => {
          let prob=0;
          for(let k=Math.floor(line)+1; k<=5; k++) prob+=binomPMF(p,k);
          return prob;
        };
        // Full PMF array [P(X=0)..P(X=5)]
        const binomDist = p => binomCoeff.map((_,k)=>binomPMF(p,k));

        // ── MONEYLINE via MC (convolve two Binomials per team, compare sums) ──
        // P(teamA wins) = sum over all combos of (kA1,kA2,kB1,kB2) where kA1+kA2 > kB1+kB2
        // With 6^4 = 1296 combos this is exact and fast.
        const computeOdds = (s) => {
          const tA=s.teamA||[], tB=s.teamB||[];
          const allP=[...tA,...tB];

          const ps = {}; // per-cup prob per pid
          allP.forEach(pid=>{ ps[pid]=playerP(pid); });
          const dists = {}; // PMF arrays
          allP.forEach(pid=>{ dists[pid]=binomDist(ps[pid]); });

          // Exact moneyline: enumerate all outcomes
          let winsA=0, total=0;
          const tA0=dists[tA[0]], tA1=dists[tA[1]];
          const tB0=dists[tB[0]], tB1=dists[tB[1]];
          for(let a0=0;a0<=5;a0++) for(let a1=0;a1<=5;a1++)
          for(let b0=0;b0<=5;b0++) for(let b1=0;b1<=5;b1++){
            const prob=tA0[a0]*tA1[a1]*tB0[b0]*tB1[b1];
            if(a0+a1>b0+b1) winsA+=prob;
            if(a0+a1===b0+b1) winsA+=prob*0.5; // tie = 50/50
            total+=prob;
          }
          const trueWinA=winsA/total;
          const [,,mlA,mlB]=vig2(trueWinA);

          // Cup spread: enumerate P(sumA - sumB > L) for each L, pick closest to 50%
          // Build joint distribution of (sumA, sumB)
          const teamDist = (pids) => {
            const d0=dists[pids[0]], d1=dists[pids[1]];
            const out=new Array(11).fill(0); // sum 0..10
            for(let i=0;i<=5;i++) for(let j=0;j<=5;j++) out[i+j]+=d0[i]*d1[j];
            return out;
          };
          const distA=teamDist(tA), distB=teamDist(tB);
          // P(sumA - sumB > L): enumerate all (sumA, sumB) pairs
          const SPREAD_LINES=[-4.5,-3.5,-2.5,-1.5,-0.5,0.5,1.5,2.5,3.5,4.5];
          let bestSpread=0.5,bestCover=0.5,bestDist2=1;
          SPREAD_LINES.forEach(line=>{
            let cover=0;
            for(let a=0;a<=10;a++) for(let b=0;b<=10;b++)
              if(a-b>line) cover+=distA[a]*distB[b];
            const dist2=Math.abs(cover-0.5);
            if(dist2<bestDist2){bestDist2=dist2;bestSpread=line;bestCover=cover;}
          });
          const [,,spreadOddsA,spreadOddsB]=vig2(bestCover);
          const spreadLineStr=Math.abs(bestSpread).toFixed(1);
          const spreadLabelA=bestSpread>0?`-${spreadLineStr}`:`+${spreadLineStr}`;
          const spreadLabelB=bestSpread>0?`+${spreadLineStr}`:`-${spreadLineStr}`;

          // Player O/U: pick line in [0.5..4.5] where P(X > line) closest to 50%
          const LINES=[0.5,1.5,2.5,3.5,4.5];
          const playerOdds=allP.map(pid=>{
            const p=ps[pid];
            let bestLine=3.5,bestOver=0.5,bestLineDist=1;
            LINES.forEach(line=>{
              const over=binomOver(p,line);
              const dist=Math.abs(over-0.5);
              if(dist<bestLineDist){bestLineDist=dist;bestLine=line;bestOver=over;}
            });
            const trueOver=Math.min(0.93,Math.max(0.07,bestOver));
            const [,,oddsO,oddsU]=vig2(trueOver);
            return {pid,line:bestLine,trueOver,oddsO,oddsU,pHit:p};
          });

          // Close game (loser hits ≥8): P(loser sum ≥ 8)
          // loser = team that loses; P(loser sum ≥ 8 | A wins)*P(A wins) + P(loser sum ≥ 8 | B wins)*P(B wins)
          let pClose=0;
          for(let a=0;a<=10;a++) for(let b=0;b<=10;b++){
            const pJoint=distA[a]*distB[b];
            if(a>b && b>=8) pClose+=pJoint;   // A wins, loser is B
            if(b>a && a>=8) pClose+=pJoint;   // B wins, loser is A
            if(a===b){ if(b>=8) pClose+=pJoint*0.5; if(a>=8) pClose+=pJoint*0.5; }
          }
          const trueClose=Math.min(0.92,Math.max(0.04,pClose));
          const [,,closeY,closeN]=vig2(trueClose);

          // Naked lap: P(at least one loser player hits 0 cups)
          // P(player hits 0) = (1-p)^5; P(at least one on losing team hits 0)
          // Approximate: P(nak | A wins) = 1 - prod_{p in tB}(1-(1-p)^5)
          const pNakGivenWin=(losers)=>1-losers.reduce((acc,pid)=>acc*(1-Math.pow(1-ps[pid],5)),1);
          const trueNak=Math.min(0.92,Math.max(0.04,trueWinA*pNakGivenWin(tB)+(1-trueWinA)*pNakGivenWin(tA)));
          const [,,nakY,nakN]=vig2(trueNak);

          // Puskas: unchanged (no per-shot streak data to model)
          const closeDenom=games.length;
          const puskasGameCount=games.filter(g=>PIDS.some(p2=>g.puskas&&g.puskas[p2])).length;
          const leaguePuskasRate=closeDenom>0?puskasGameCount/closeDenom:0.10;
          const indivPuskasProbs=allP.map(pid=>{const pst=st[pid];const gp=pst?.gp||0;const puskasCount=games.filter(g=>g.puskas&&g.puskas[pid]).length;const empirical=gp>0?puskasCount/gp:null;return empirical!==null?(empirical*gp+leaguePuskasRate*3)/(gp+3):leaguePuskasRate;});
          const pAnyPuskas=1-indivPuskasProbs.reduce((acc,p2)=>acc*(1-p2),1);
          const truePuskas=Math.min(0.60,Math.max(0.04,pAnyPuskas));
          const [,,puskasY,puskasN]=vig2(truePuskas);

          return {trueWinA,mlA,mlB,spreadLine:bestSpread,spreadLabelA,spreadLabelB,spreadOddsA,spreadOddsB,trueACover:bestCover,playerOdds,trueClose,closeY,closeN,trueNak,nakY,nakN,truePuskas,puskasY,puskasN};
        };

        // ── RENDER HELPERS ──
        const card=(title,sub,odds,pct,isFav)=>(
          <div style={{flex:1,minWidth:110,padding:"10px 8px",borderRadius:8,border:`1px solid ${isFav?"#1aff8c55":"#ffffff14"}`,background:isFav?"#1aff8c0a":"#ffffff05",textAlign:"center"}}>
            {sub&&<div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:3,textTransform:"uppercase"}}>{sub}</div>}
            <div style={{fontSize:11,color:"#bbb",fontWeight:600,marginBottom:5,lineHeight:1.3}}>{title}</div>
            <div style={{fontSize:22,fontWeight:900,color:isFav?FD_GREEN:"#e8e8e8",letterSpacing:-0.5}}>{odds}</div>
            <div style={{fontSize:9,color:"#444",marginTop:3}}>{pct}% TRUE</div>
          </div>
        );
        const OVER_COL="#1aff8c", UNDER_COL="#f0a500";
        const ouCard=(dir,line,odds,pct,isFav)=>{
          const accentCol=dir==="Over"?OVER_COL:UNDER_COL;
          return(
            <div style={{flex:1,minWidth:110,padding:"10px 8px",borderRadius:8,border:`1px solid ${isFav?accentCol+"88":"#ffffff14"}`,background:isFav?accentCol+"0d":"#ffffff05",textAlign:"center"}}>
              <div style={{fontSize:11,fontWeight:800,letterSpacing:2,marginBottom:1,textTransform:"uppercase",color:accentCol}}>{dir}</div>
              <div style={{fontSize:20,fontWeight:900,color:accentCol,letterSpacing:-0.5,marginBottom:3}}>{line}</div>
              <div style={{fontSize:22,fontWeight:900,color:isFav?accentCol:"#e8e8e8",letterSpacing:-0.5}}>{odds}</div>
              <div style={{fontSize:9,color:"#444",marginTop:3}}>{pct}% TRUE</div>
            </div>
          );
        };
        const sectionHeader=(label)=>(
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"4px 0 10px"}}>
            <div style={{width:3,height:16,borderRadius:2,background:FD_GREEN,flexShrink:0}}/>
            <div style={{fontSize:11,fontWeight:800,color:"#ccc",letterSpacing:2,textTransform:"uppercase"}}>{label}</div>
            <div style={{flex:1,height:1,background:"#1aff8c18"}}/>
          </div>
        );

        // ── ODDS PANEL (renders a full odds board for a given matchup object s + computed odds o) ──
        const oddsPanel=(s,o,label)=>{
          const pName=pid=>players[pid]||pid;
          const tA=(s.teamA||[]).map(pName).join(" & ");
          const tB=(s.teamB||[]).map(pName).join(" & ");
          const sit=(s.sitting||[]).map(pName).join(", ");
          return(
            <div style={{border:"1px solid #1aff8c22",borderRadius:14,overflow:"hidden",background:"#0a1a12"}}>
              <div style={{background:"linear-gradient(135deg,#0a2010,#0d1a10)",padding:"12px 18px",borderBottom:"1px solid #1aff8c18",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontSize:9,color:FD_GREEN,letterSpacing:3,fontWeight:700,marginBottom:6}}>{label}</div>
                  <div style={{fontSize:17,fontWeight:800,color:"#e8e8e8"}}>
                    <span style={{color:CA}}>{tA}</span>
                    <span style={{color:"#333",margin:"0 12px",fontSize:13}}>vs</span>
                    <span style={{color:CB}}>{tB}</span>
                  </div>
                </div>
                {sit&&<div style={{fontSize:10,color:"#444"}}>Sitting: <span style={{color:"#555"}}>{sit}</span></div>}
              </div>
              <div style={{padding:"16px 18px",display:"flex",flexDirection:"column",gap:20}}>
                {/* Main Bets */}
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  {sectionHeader("Main Bets")}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                    <div>
                      <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Moneyline</div>
                      <div style={{display:"flex",flexDirection:"column",gap:6}}>
                        {[{name:tA,odds:o.mlA,pct:Math.round(o.trueWinA*100),fav:o.trueWinA>=0.5},{name:tB,odds:o.mlB,pct:Math.round((1-o.trueWinA)*100),fav:o.trueWinA<0.5}].map((row,i)=>(
                          <div key={i} style={{flex:1,padding:"10px 8px",borderRadius:8,border:`1px solid ${row.fav?"#1aff8c55":"#ffffff14"}`,background:row.fav?"#1aff8c0a":"#ffffff05",textAlign:"center"}}>
                            <div style={{fontSize:11,color:"#bbb",fontWeight:600,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.name}</div>
                            <div style={{fontSize:18,fontWeight:900,color:FD_GREEN,letterSpacing:-0.5,marginBottom:4}}>MONEYLINE</div>
                            <div style={{fontSize:22,fontWeight:900,color:row.fav?FD_GREEN:"#e8e8e8",letterSpacing:-0.5}}>{row.odds}</div>
                            <div style={{fontSize:9,color:"#444",marginTop:3}}>{row.pct}% TRUE</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div>
                      <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Cup Spread</div>
                      <div style={{display:"flex",flexDirection:"column",gap:6}}>
                        {[{name:tA,line:o.spreadLabelA,odds:o.spreadOddsA,pct:Math.round(o.trueACover*100),fav:o.trueACover>=0.5},{name:tB,line:o.spreadLabelB,odds:o.spreadOddsB,pct:Math.round((1-o.trueACover)*100),fav:o.trueACover<0.5}].map((row,i)=>(
                          <div key={i} style={{flex:1,padding:"10px 8px",borderRadius:8,border:`1px solid ${row.fav?"#1aff8c55":"#ffffff14"}`,background:row.fav?"#1aff8c0a":"#ffffff05",textAlign:"center"}}>
                            <div style={{fontSize:11,color:"#bbb",fontWeight:600,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.name}</div>
                            <div style={{fontSize:18,fontWeight:900,color:FD_GREEN,letterSpacing:-0.5,marginBottom:4}}>{row.line}</div>
                            <div style={{fontSize:22,fontWeight:900,color:row.fav?FD_GREEN:"#e8e8e8",letterSpacing:-0.5}}>{row.odds}</div>
                            <div style={{fontSize:9,color:"#444",marginTop:3}}>{row.pct}% TRUE</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
                {/* Player O/U */}
                <div>
                  {sectionHeader("Player Cups · Over / Under")}
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {o.playerOdds.map((pp)=>(
                      <div key={pp.pid} style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{fontSize:12,color:"#888",width:82,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pName(pp.pid)}</div>
                        <div style={{fontSize:10,color:"#333",width:52,flexShrink:0,textAlign:"right"}}>p={((o.playerOdds.find(x=>x.pid===pp.pid)||pp).pHit*100).toFixed(0)}%</div>
                        <div style={{display:"flex",gap:6,flex:1}}>
                          {ouCard("Over",pp.line,pp.oddsO,Math.round(pp.trueOver*100),pp.trueOver>=0.5)}
                          {ouCard("Under",pp.line,pp.oddsU,Math.round((1-pp.trueOver)*100),pp.trueOver<0.5)}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                {/* Game Props */}
                <div>
                  {sectionHeader("Game Props")}
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {card("Close Game","LOSER HITS 8+",o.closeY,Math.round(o.trueClose*100),o.trueClose>=0.5)}
                    {card("Not Close","LOSER HITS <8",o.closeN,Math.round((1-o.trueClose)*100),o.trueClose<0.5)}
                    {card("Naked Lap","ANY PLAYER",o.nakY,Math.round(o.trueNak*100),o.trueNak>=0.5)}
                    {card("No Naked Lap","ANY PLAYER",o.nakN,Math.round((1-o.trueNak)*100),o.trueNak<0.5)}
                    {card("Any Puskas","ANY PLAYER",o.puskasY,Math.round(o.truePuskas*100),o.truePuskas>=0.5)}
                    {card("No Puskas","ANY PLAYER",o.puskasN,Math.round((1-o.truePuskas)*100),o.truePuskas<0.5)}
                  </div>
                </div>
              </div>
              <div style={{padding:"8px 18px",borderTop:"1px solid #1aff8c0a",fontSize:9,color:"#252525",letterSpacing:1}}>
                FOR ENTERTAINMENT ONLY · ODDS POWERED BY CPR + HISTORICAL STATS · IMPLIED PROBS SUM TO 115%
              </div>
            </div>
          );
        };

        // ── CUSTOM MATCHUP PICKER ──
        // duelCustom = {teamA:[pid,pid], teamB:[pid,pid]} or null
        // duelPick = intermediate selection state: array of up to 4 pids in order clicked
        // We use a local approach: store picks in component state (duelCustom at top level)
        // Building: first 2 clicks = teamA, next 2 = teamB
        const picked = duelCustom ? [...duelCustom.teamA, ...duelCustom.teamB] : [];
        const isComplete = duelCustom && duelCustom.teamA.length===2 && duelCustom.teamB.length===2;

        // Handle player button click during building
        const handlePick = (pid) => {
          // If already complete, clicking resets
          if(isComplete){ setDuelCustom(null); return; }
          const cur = duelCustom ? [...duelCustom.teamA,...duelCustom.teamB] : [];
          if(cur.includes(pid)) return; // already picked
          const next=[...cur,pid];
          if(next.length<2) setDuelCustom({teamA:next,teamB:[]});
          else if(next.length===2) setDuelCustom({teamA:next,teamB:[]});
          else if(next.length===3) setDuelCustom({teamA:next.slice(0,2),teamB:[next[2]]});
          else if(next.length===4){
            const tA=next.slice(0,2), tB=next.slice(2,4);
            const sit=PIDS.filter(p=>![...tA,...tB].includes(p));
            setDuelCustom({teamA:tA,teamB:tB,sitting:sit});
          }
        };

        const pickColor=(pid)=>{
          const cur=duelCustom?[...duelCustom.teamA,...duelCustom.teamB]:[];
          const idx=cur.indexOf(pid);
          if(idx===0||idx===1) return CA;
          if(idx===2||idx===3) return CB;
          return null;
        };
        const pickLabel=(pid)=>{
          const cur=duelCustom?[...duelCustom.teamA,...duelCustom.teamB]:[];
          const idx=cur.indexOf(pid);
          if(idx===0) return "A1"; if(idx===1) return "A2";
          if(idx===2) return "B1"; if(idx===3) return "B2";
          return null;
        };
        const buildStage=()=>{
          const cur=duelCustom?[...duelCustom.teamA,...duelCustom.teamB]:[];
          if(cur.length===0) return "Pick Team A — Player 1";
          if(cur.length===1) return "Pick Team A — Player 2";
          if(cur.length===2) return "Pick Team B — Player 1";
          if(cur.length===3) return "Pick Team B — Player 2";
          return "Complete ✓";
        };

        // Compute odds for suggestion
        const suggMatchup = suggestion || {teamA:["p1","p2"],teamB:["p3","p4"],sitting:["p5","p6"]};
        const suggOdds = computeOdds(suggMatchup);
        const customOdds = isComplete ? computeOdds(duelCustom) : null;

        return (
          <div style={{display:"flex",flexDirection:"column",gap:24}}>
            {/* Header */}
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div style={{background:"linear-gradient(135deg,#1aff8c,#00cc66)",borderRadius:8,padding:"4px 12px",fontSize:13,fontWeight:900,color:"#000",letterSpacing:1}}>FLONG<span style={{color:"#004422"}}>DUEL</span></div>
              <div style={{fontSize:10,color:"#444",letterSpacing:2}}>AMERICAN ODDS · 15% JUICE</div>
            </div>

            {/* Suggested matchup odds */}
            {oddsPanel(suggMatchup, suggOdds, "SUGGESTED NEXT GAME")}

            {/* Custom matchup builder */}
            <div style={{border:"1px solid #ffffff14",borderRadius:14,overflow:"hidden",background:"#0d0d14"}}>
              <div style={{padding:"12px 18px",borderBottom:"1px solid #ffffff08",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <div style={{fontSize:11,fontWeight:800,color:"#ccc",letterSpacing:2,textTransform:"uppercase"}}>Custom Matchup</div>
                {(duelCustom)&&<button onClick={()=>setDuelCustom(null)} style={{background:"none",border:"1px solid #333",color:"#555",padding:"3px 10px",borderRadius:6,cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>Reset</button>}
              </div>
              <div style={{padding:"14px 18px",display:"flex",flexDirection:"column",gap:12}}>
                <div style={{fontSize:10,color:isComplete?"#1aff8c":"#555",letterSpacing:1}}>{buildStage()}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {PIDS.map(pid=>{
                    const col=pickColor(pid);
                    const lbl=pickLabel(pid);
                    const inCur=duelCustom&&[...duelCustom.teamA,...duelCustom.teamB].includes(pid);
                    return(
                      <button key={pid} onClick={()=>handlePick(pid)} style={{
                        padding:"8px 14px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,
                        border:`1px solid ${col?col+"88":"#333"}`,
                        background:col?col+"18":"#111",
                        color:col||"#666",
                        transition:"all .12s",
                        opacity:isComplete&&!inCur?0.3:1,
                      }}>
                        {players[pid]}{lbl&&<span style={{fontSize:9,marginLeft:5,opacity:0.7}}>{lbl}</span>}
                      </button>
                    );
                  })}
                </div>
                {duelCustom&&!isComplete&&(
                  <div style={{display:"flex",gap:12,fontSize:11,color:"#444"}}>
                    <span style={{color:CA}}>Team A: {(duelCustom.teamA||[]).map(p=>players[p]).join(" & ")||"—"}</span>
                    <span style={{color:CB}}>Team B: {(duelCustom.teamB||[]).length>0?(duelCustom.teamB||[]).map(p=>players[p]).join(" & "):"—"}</span>
                  </div>
                )}
              </div>
            </div>

            {/* Custom matchup odds (only when complete) */}
            {isComplete && customOdds && oddsPanel(duelCustom, customOdds, "CUSTOM MATCHUP")}
          </div>
        );
      })()}

      {/* ── INJURIES ── */}
      {tab==="injury"&&(()=>{
        const injured = injuredPid;
        const injuredName = injured ? players[injured] : null;
        // Next 3 suggestions excluding the injured player
        const next3 = suggestN(games, 3, injured ? [injured] : []);
        const gameLabels = ["GAME 1","GAME 2","GAME 3"];
        const teamColor = (pid, tA, tB) => tA.includes(pid)?CA:tB.includes(pid)?CB:"#555";

        return (
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            {/* Header */}
            <div style={{border:"1px solid #ff444433",borderRadius:12,padding:"16px 20px",background:"#1a0d0d"}}>
              <div style={{fontSize:10,color:"#ff4444",letterSpacing:3,textTransform:"uppercase",marginBottom:12}}>🩹 Player Injury Report</div>
              <div style={{fontSize:13,color:"#666",marginBottom:16,lineHeight:1.6}}>
                Select a player who can't play. The next 3 suggested matchups will be recalculated to exclude them.
              </div>

              {/* Player selector */}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {PIDS.map(pid=>{
                  const isSelected = injured===pid;
                  return (
                    <button key={pid} onClick={()=>setInjuredPid(isSelected?null:pid)}
                      style={{padding:"8px 16px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                        fontSize:13,fontWeight:700,letterSpacing:0.5,transition:"all .15s",
                        border:`1px solid ${isSelected?"#ff444488":"#2a2a2a"}`,
                        background:isSelected?"#ff444422":"#111",
                        color:isSelected?"#ff6666":"#666"}}>
                      {isSelected?"🚑 ":""}{players[pid]}
                    </button>
                  );
                })}
              </div>

              {injured&&(
                <div style={{marginTop:14,padding:"10px 14px",borderRadius:8,background:"#ff44440a",border:"1px solid #ff444422",fontSize:12,color:"#ff5555",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:16}}>🚑</span>
                  <span><strong>{injuredName}</strong> is out — all 3 suggestions below exclude them.</span>
                  <button onClick={()=>setInjuredPid(null)} style={{marginLeft:"auto",background:"none",border:"1px solid #ff444444",borderRadius:6,color:"#ff4444",cursor:"pointer",fontFamily:"inherit",fontSize:11,padding:"3px 10px"}}>Clear</button>
                </div>
              )}
            </div>

            {/* 3 suggested games */}
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {next3.map((g,gi)=>{
                const allInGame = [...g.teamA,...g.teamB];
                const sittingOut = g.sitting;
                return (
                  <div key={gi} style={{border:"1px solid #1a1a2e",borderRadius:12,overflow:"hidden",background:"#0d0d18"}}>
                    {/* Game header */}
                    <div style={{padding:"10px 16px",borderBottom:"1px solid #1a1a2e",display:"flex",alignItems:"center",gap:12,background:"#111118"}}>
                      <div style={{fontSize:9,color:CA,letterSpacing:3,fontWeight:700}}>{gameLabels[gi]}</div>
                      <div style={{flex:1,fontSize:15,fontWeight:800}}>
                        <span style={{color:CA}}>{g.teamA.map(p=>players[p]).join(" + ")}</span>
                        <span style={{color:"#333",margin:"0 10px",fontSize:12}}>vs</span>
                        <span style={{color:CB}}>{g.teamB.map(p=>players[p]).join(" + ")}</span>
                      </div>
                    </div>
                    {/* Players grid */}
                    <div style={{padding:"14px 16px",display:"flex",gap:8,flexWrap:"wrap"}}>
                      {PIDS.map(pid=>{
                        const inGame = allInGame.includes(pid);
                        const isInjuredPlayer = pid===injured;
                        const col = inGame ? teamColor(pid,g.teamA,g.teamB) : isInjuredPlayer ? "#ff4444" : "#2a2a2a";
                        const teamLabel = g.teamA.includes(pid)?"Team A":g.teamB.includes(pid)?"Team B":isInjuredPlayer?"OUT (inj)":"Sitting";
                        return (
                          <div key={pid} style={{padding:"8px 14px",borderRadius:8,border:`1px solid ${col}44`,background:`${col}0d`,textAlign:"center",minWidth:90}}>
                            <div style={{fontSize:13,fontWeight:700,color:inGame?col:isInjuredPlayer?"#ff4444":"#333"}}>
                              {isInjuredPlayer?"🚑 ":""}{players[pid]}
                            </div>
                            <div style={{fontSize:10,color:inGame?col+"aa":isInjuredPlayer?"#ff444488":"#2a2a2a",marginTop:3,letterSpacing:1}}>{teamLabel}</div>
                          </div>
                        );
                      })}
                    </div>
                    {/* Use this button */}
                    <div style={{padding:"10px 16px",borderTop:"1px solid #1a1a2e",display:"flex",justifyContent:"flex-end"}}>
                      <button onClick={()=>{setForm({...DEF_FORM(),teamA:g.teamA,teamB:g.teamB,sitting:g.sitting});setTab("log");}}
                        style={{padding:"7px 18px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,letterSpacing:1,border:`1px solid ${GOLD}55`,background:`${GOLD}12`,color:GOLD}}>
                        USE THIS →
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ── PLAYLIST ── */}
      {tab==="music"&&(()=>{
        const sections=[
          {label:"Hype / Anthems",songs:[{t:"Levels",a:"Avicii"},{t:"Turn Down for What",a:"DJ Snake & Lil Jon"},{t:"HUMBLE.",a:"Kendrick Lamar"},{t:"Sicko Mode",a:"Travis Scott"},{t:"God's Plan",a:"Drake"},{t:"Started From the Bottom",a:"Drake"}]},
          {label:"High Energy Bangers",songs:[{t:"Antidote",a:"Travis Scott"},{t:"Big Rings",a:"Drake & Future"},{t:"Power",a:"Kanye West"},{t:"FRANCHISE",a:"Travis Scott"},{t:"Jumpman",a:"Drake & Future"},{t:"fck it up",a:"A$AP Rocky"}]},
          {label:"Crowd Pleasers",songs:[{t:"Mr. Brightside",a:"The Killers"},{t:"Bohemian Rhapsody",a:"Queen"},{t:"Don't Stop Me Now",a:"Queen"},{t:"Sweet Caroline",a:"Neil Diamond"},{t:"Livin' on a Prayer",a:"Bon Jovi"},{t:"All Star",a:"Smash Mouth"}]},
          {label:"Recent Hits",songs:[{t:"fukumean",a:"Gunna"},{t:"Rich Flex",a:"Drake & 21 Savage"},{t:"Superhero",a:"Metro Boomin"},{t:"Scientists & Engineers",a:"Gunna"},{t:"Spin Bout U",a:"Drake & 21 Savage"}]},
          {label:"Late Night Vibes",songs:[{t:"Night Owl",a:"Galimatias"},{t:"Nights",a:"Frank Ocean"},{t:"Crew",a:"GoldLink"}]},
        ];
        return(
          <div style={{border:"1px solid #1a1a2e",borderRadius:12,padding:20,background:"#0d0d18"}}>
            <div style={{fontSize:11,letterSpacing:3,color:"#555",marginBottom:4,textTransform:"uppercase"}}>🎵 Flong Playlist</div>
            <div style={{fontSize:10,color:"#333",marginBottom:20,letterSpacing:1}}>HIGH ENERGY · CATCHY · OPENS SPOTIFY APP DIRECTLY</div>
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              {sections.map(sec=>(
                <div key={sec.label}>
                  <div style={{fontSize:10,color:CA,letterSpacing:3,textTransform:"uppercase",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #1a1a2e"}}>{sec.label}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:1}}>
                    {sec.songs.map((s,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 10px",borderRadius:7,transition:"background .1s"}} onMouseEnter={e=>e.currentTarget.style.background="#ffffff06"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <div style={{fontSize:11,color:"#2a2a2a",width:20,textAlign:"right"}}>{i+1}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:700,color:"#e0e0e0"}}>{s.t}</div>
                          <div style={{fontSize:11,color:"#555",marginTop:1}}>{s.a}</div>
                        </div>
                        <a href={spotifyHref(s.t,s.a)} style={{fontSize:10,color:"#1db954",border:"1px solid #1db95444",padding:"4px 10px",borderRadius:6,textDecoration:"none",letterSpacing:1,flexShrink:0}}>SPOTIFY</a>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* CHAMP PROB INFO MODAL */}
      {champInfo&&(
        <div onClick={()=>setChampInfo(false)} style={{position:"fixed",inset:0,background:"#000000bb",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0d0d18",border:`1px solid ${GOLD}33`,borderRadius:14,padding:24,maxWidth:420,width:"100%",position:"relative"}}>
            <button onClick={()=>setChampInfo(false)} style={{position:"absolute",top:12,right:14,background:"none",border:"none",color:"#555",fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>
            <div style={{fontSize:10,color:GOLD,letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>Championship Probability</div>
            <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:16}}>🏆% Explained</div>
            <div style={{display:"flex",flexDirection:"column",gap:12,fontSize:13,color:"#888",lineHeight:1.7}}>
              <p>Each player's <strong style={{color:"#ccc"}}>🏆%</strong> is their estimated probability of finishing in the <strong style={{color:"#ccc"}}>top 4</strong> and making the championship match.</p>
              <p>It is computed via <strong style={{color:"#ccc"}}>Monte Carlo simulation</strong>: 3,000 possible continuations of the season are simulated. In each, future matchups are chosen randomly, winners determined probabilistically based on CPR scores, and players ranked by final win% (tiebreak: cup avg). The percentage is how often each player lands in the top 4 across all simulations.</p>
              <div style={{padding:"10px 12px",borderRadius:8,background:"#ffffff06",border:"1px solid #1a1a2e"}}>
                <div style={{fontSize:11,color:GOLD,marginBottom:6,letterSpacing:1}}>SCALE</div>
                <div>Each player's value is an <strong style={{color:"#ccc"}}>independent probability</strong> between 0% and 100%. They do not need to sum to any fixed number — a strong field may have all six players in the 50–80% range.</div>
              </div>
              <div style={{padding:"10px 12px",borderRadius:8,background:"#ffffff06",border:"1px solid #1a1a2e"}}>
                <div style={{fontSize:11,color:GOLD,marginBottom:6,letterSpacing:1}}>WHAT IT IS NOT</div>
                <div>This is <em>not</em> a head-to-head win probability for the final match itself — it's the probability of qualifying for it.</div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* CPR INFO MODAL */}
      {cprInfo&&(
        <div onClick={()=>setCprInfo(false)} style={{position:"fixed",inset:0,background:"#000000bb",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0d0d18",border:`1px solid ${CA}33`,borderRadius:14,padding:24,maxWidth:420,width:"100%",position:"relative"}}>
            <button onClick={()=>setCprInfo(false)} style={{position:"absolute",top:12,right:14,background:"none",border:"none",color:"#555",fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>
            <div style={{fontSize:10,color:CA,letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>Claude Player Rating</div>
            <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:16}}>CPR Formula</div>
            <div style={{fontSize:12,color:"#666",marginBottom:18,lineHeight:1.6}}>A composite 0–100 score measuring overall player quality. No player is guaranteed to hit 100 or 0 — these are just scale anchors.</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[
                {label:"Win Rate",pts:"30 pts",desc:"Percentage of games won × 30",color:"#4caf50"},
                {label:"Cup Efficiency",pts:"20 pts",desc:"Cups hit ÷ max possible (5 per game) × 20",color:CA},
                {label:"Cup Differential",pts:"15 pts",desc:"Your avg cups/game minus opponents' avg cups/game, normalized against the field's best differential",color:"#4caf50"},
                {label:"Recent Form",pts:"12 pts",desc:"Win rate across last 3 games × 12",color:"#ff8c00"},
                {label:"Clutch Factor",pts:"10 pts",desc:"Win rate in close games (losing team hit ≥8 cups) × 10. No close games = 5 pts (league average)",color:GOLD},
                {label:"Puskas Rate",pts:"5 pts",desc:"Hotstreak bonus — Puskas count ÷ games played × 5",color:GOLD},
                {label:"Opponent Strength",pts:"5 pts",desc:"Avg win rate of opponents faced × 5 — rewards beating strong competition",color:"#cc88ff"},
                {label:"Sample Size",pts:"3 pts",desc:"Scales linearly up to 5 games played",color:"#aaa"},
                {label:"Naked Lap Penalty",pts:"−4 each",desc:"−4 per naked lap, capped at −12",color:NAK},
              ].map(({label,pts,desc,color})=>(
                <div key={label} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"10px 12px",borderRadius:8,background:"#ffffff05",border:"1px solid #1a1a2e"}}>
                  <div style={{minWidth:90}}>
                    <div style={{fontSize:12,fontWeight:700,color}}>{label}</div>
                    <div style={{fontSize:11,color,opacity:0.7,marginTop:2}}>{pts}</div>
                  </div>
                  <div style={{fontSize:12,color:"#666",lineHeight:1.5}}>{desc}</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:16,padding:"10px 12px",borderRadius:8,background:`${CA}0a`,border:`1px solid ${CA}22`,fontSize:11,color:"#555",lineHeight:1.6}}>
              Max possible ≈ 100 · Typical range for active players: 30–75
            </div>
          </div>
        </div>
      )}

      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
